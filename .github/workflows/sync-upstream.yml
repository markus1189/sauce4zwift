name: Sync upstream and rebase flake

on:
  schedule:
    - cron: '0 6 */3 * *' # every 3 days at 06:00 UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: flake
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream and fetch
        run: |
          git remote add upstream https://github.com/SauceLLC/sauce4zwift.git
          git fetch upstream main
          git fetch origin main

      - name: Sync fork main with upstream
        run: |
          git checkout main
          git merge --ff-only upstream/main
          git push origin main

      - name: Rebase flake on updated main
        run: |
          git checkout flake
          git rebase main

      - name: Force push rebased flake branch
        run: git push --force-with-lease origin flake
