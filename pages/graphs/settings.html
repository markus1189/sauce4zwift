<!DOCTYPE html>
<html class="settings-page hidden-during-load" tabindex="0">
    <head>
        <meta charset="utf-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
        <meta name="apple-mobile-web-app-capable" content="yes"/>
        <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline';"/>

        <title>Power/HR Graph - Settings - Sauce for Zwift™</title>

        <script src="../src/preloads.js"></script>

        <link id="favicon" rel="shortcut icon" href="../images/favicon.png"/>
        <link rel="stylesheet" href="../css/common.css"/>

        <script type="module">
            import {settingsMain} from '../src/power-hr-graph.mjs';
            settingsMain();
        </script>
    </head>
    <body>
        <div id="titlebar">
            <header>
                <div class="logo"><img src="../images/icon128.png"/></div>
                <div class="title">Power/HR Graph - Settings</div>
                <div class="filler"></div>
                <div class="buttons">
                    <div title="Close this window" class="button close electron-only"><ms>close</ms></div>
                </div>
            </header>
        </div>
        <div id="settings">
            <form>
                <label>
                    <key>Time window:</key>
                    <select data-type="number" name="timeWindow">
                        <option value="300">5 minutes</option>
                        <option value="600">10 minutes</option>
                        <option value="900">15 minutes</option>
                        <option value="1800">30 minutes</option>
                        <option value="3600">60 minutes</option>
                    </select>
                </label>
                <label>
                    <key>X-axis labels:</key>
                    <select name="xAxisMode">
                        <option value="elapsed">Elapsed time</option>
                        <option value="timeOfDay">Time of day</option>
                    </select>
                </label>
                <label>
                    <key>Data smoothing:</key>
                    <select data-type="number" name="dataSmoothing">
                        <option value="0">None</option>
                        <option value="5">5 seconds</option>
                        <option value="15">15 seconds</option>
                        <option value="60">1 minute</option>
                        <option value="300">5 minutes</option>
                        <option value="1200">20 minutes</option>
                    </select>
                </label>
                <hr/>
                <label>
                    <key>Power:</key>
                    <input type="checkbox" name="powerEn"/>
                </label>
                <label>
                    <key>Heart rate:</key>
                    <input type="checkbox" name="hrEn"/>
                </label>
                <label>
                    <key>Speed:</key>
                    <input type="checkbox" name="speedEn"/>
                </label>
                <label>
                    <key>Cadence:</key>
                    <input type="checkbox" name="cadenceEn"/>
                </label>
                <label>
                    <key>Draft:</key>
                    <input type="checkbox" name="draftEn"/>
                </label>
                <label>
                    <key>W'bal:</key>
                    <input type="checkbox" name="wbalEn"/>
                </label>
                <hr/>
                <label>
                    <key>Theme override:</key>
                    <select is="sauce-theme" override></select>
                </label>
                <label class="electron-only">
                    <key>Transparency:</key>
                    <input type="range" name="transparency" min="0" max="100" step="1"/>
                    <input type="number" name="transparency" style="--size: 4"/>%
                </label>
                <label title="Mostly useful for streamers using OBS window and browser sources">
                    <key>Solid background:</key>
                    <input type="checkbox" name="solidBackground"/>
                </label>
                <label>
                    <key>Background color:</key>
                    <input type="color" name="backgroundColor" data-depends-on="solidBackground"/>
                    <input type="text" name="backgroundColor" data-depends-on="solidBackground" size="7"/>
                </label>
            </form>
        </div>
    </body>
</html>
